            color: #f0f0f0;
            overflow-x: hidden;

            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(35px); }
            to { opacity: 1; transform: translateY(0); }

        @keyframes bounceSoft {

            0% { text-shadow: 0 0 0 #ff8c00; }

        .close-modal-btn {

            right: 0;

            font-size: 28px;
            width: 40px;

            cursor: pointer;
            color: white;

        .close-modal-btn:hover {

        if (emailField) {

                if (e.key === "Enter") handleLogin();
            });
        }

    function handleLogin() {
        const emailInput = document.getElementById("loginEmail");
        const errorSpan = document.getElementById("loginError");
        if (!emailInput) return;
        const email = emailInput.value.trim().toLowerCase();
        if (!email) {
            errorSpan.innerText = "❌ Please enter your email";

        if (isEmailAllowed(email)) {

            localStorage.setItem("ladlaUserEmail", email);

            errorSpan.innerText = "❌ Access Denied! This email is not authorized.";

    function renderAppsGrid() {
        const container = document.getElementById("appsList");
        if (!container) return;
        let html = "";
        for (let app of APPS_DATA) {
            html += `
                <div class="app-card">
                    <div class="app-icon">${app.icon}</div>
                    <h3>${app.name}</h3>
                    <p>${app.description}</p>
                    <a href="${app.link}" class="download-btn" download>⬇️ Download Now</a>
                </div>
            `;
        }
        container.innerHTML = html;
    }

    function renderVideosGrid() {
        const container = document.getElementById("videosList");
        if (!container) return;
        let html = "";
        for (let video of VIDEOS_DATA) {
            html += `
                <div class="video-card" data-video-id="${video.videoId}">
                    <div class="video-thumbnail">
                        <div class="play-icon">▶️</div>
                    </div>
                    <div class="video-info">
                        <h3>📺 ${video.no}: ${video.title}</h3>
                        <p>${video.description}</p>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
        // Attach event listeners to each video card
        document.querySelectorAll(".video-card").forEach(card => {
            const vidId = card.getAttribute("data-video-id");
            card.addEventListener("click", () => playVideoById(vidId));
        });
    }

    function playVideoById(videoId) {
        if (!videoId) return;
        const embedUrl = getDriveEmbedUrl(videoId);
        const modalDiv = document.createElement("div");
        modalDiv.className = "video-modal";
        modalDiv.innerHTML = `
            <div class="modal-container">
                <div class="close-modal-btn" id="closeModalBtn">✕</div>
                <iframe src="${embedUrl}" frameborder="0" allowfullscreen></iframe>
            </div>
        `;
        document.body.appendChild(modalDiv);
        const closeBtn = modalDiv.querySelector("#closeModalBtn");
        const closeModal = () => {
            if (modalDiv && modalDiv.remove) modalDiv.remove();
        };
        closeBtn?.addEventListener("click", closeModal);
        modalDiv.addEventListener("click", (e) => {
            if (e.target === modalDiv) closeModal();
        });
    }

        resources.style.display = "none";
        videos.style.display = "none";
        
        if (pageName === "home") {
            home.classList.add("active");
            home.style.display = "block";
        } else if (pageName === "resources") {
            resources.classList.add("active");
            resources.style.display = "block";
        } else if (pageName === "videos") {
            videos.classList.add("active");
            videos.style.display = "block";
        }
    }

    // ========== INIT ==========
    function init() {
        // ensure app container exists
        if (!document.getElementById("app")) {
            const newApp = document.createElement("div");
            newApp.id = "app";
            document.body.appendChild(newApp);
        }
        const loggedIn = localStorage.getItem("ladlaLoggedIn") === "true";
        if (loggedIn) {
            renderMainWebsite();
        } else {
            renderLoginPage();
        }
    }

    // start the application
    init();
</script>
</body>
</html>
