        if (!container) return;
        let html = "";
        for (let video of VIDEOS_DATA) {
            html += `
                <div class="video-card" data-video-id="${video.videoId}">
                    <div class="video-thumbnail">
                        <div class="play-icon">▶️</div>
                    </div>
                    <div class="video-info">
                        <h3>📺 ${video.no}: ${video.title}</h3>
                        <p>${video.description}</p>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
        document.querySelectorAll(".video-card").forEach(card => {
            const vidId = card.getAttribute("data-video-id");
            card.addEventListener("click", () => playVideo(vidId));
        });
    }

    function playVideo(videoId) {
        const modal = document.createElement("div");
        modal.className = "video-modal";
        modal.innerHTML = `
            <div class="modal-container">
                <div class="close-modal-btn">✕</div>
                <iframe src="https://drive.google.com/file/d/${videoId}/preview" frameborder="0" allowfullscreen></iframe>
            </div>
        `;
        document.body.appendChild(modal);
        modal.querySelector(".close-modal-btn").onclick = () => modal.remove();
        modal.onclick = (e) => { if(e.target === modal) modal.remove(); };
    }

    function showPage(pageName) {
        const pages = {
            home: document.getElementById("homePage"),
            resources: document.getElementById("resourcesPage"),
            videos: document.getElementById("videosPage"),
            admin: document.getElementById("adminPage")
        };
        
        Object.values(pages).forEach(p => { if(p) { p.classList.remove("active"); p.style.display = "none"; } });
        
        if (pages[pageName]) {
            pages[pageName].classList.add("active");
            pages[pageName].style.display = "block";
        }
    }

    // ========== INITIALIZATION ==========
    function init() {
        if (!document.getElementById("app")) {
            const newApp = document.createElement("div");
            newApp.id = "app";
            document.body.appendChild(newApp);
        }
        loadAllowedEmails();
        const loggedIn = localStorage.getItem("ladlaLoggedIn") === "true";
        const userEmail = localStorage.getItem("ladlaUserEmail") || "";
        
        if (loggedIn && isEmailAllowed(userEmail)) {
            renderMainWebsite();
        } else {
            localStorage.removeItem("ladlaLoggedIn");
            renderLoginPage();
        }
    }
    
    init();
</script>
</body>
</html>
